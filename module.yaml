product: jvm/app

dependencies:
  - io.ktor:ktor-client-core:3.4.0
  - io.ktor:ktor-client-cio:3.4.0
  - io.ktor:ktor-client-content-negotiation:3.4.0
  - io.ktor:ktor-serialization-kotlinx-json:3.4.0
  - io.github.cdimascio:dotenv-kotlin:6.5.1

test-dependencies:
  - io.mockk:mockk:1.14.9

settings:
  kotlin:
    freeCompilerArgs:
      - -Xopt-in=kotlin.time.ExperimentalTime
    powerAssert:
      enabled: true
      functions:
        - kotlin.test.assertEquals
    serialization:
      format: json
      version: 1.10.0
